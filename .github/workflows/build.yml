name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_args: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle_args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundle_args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle_args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf

      - name: Fetch WebView2Loader.dll (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: pwsh scripts/fetch-webview2-loader.ps1

      - name: Fetch BGE embedding model
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            pwsh scripts/fetch-bge-model.ps1
          else
            bash scripts/fetch-bge-model.sh
          fi

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Node dependencies
        run: pnpm install

      # Detect whether Apple signing secrets are configured. The env
      # value is a plain "true" / "false" that later steps can `if:` on.
      # We can't reference `secrets.*` directly inside step-level `if:`
      # expressions, so we bounce through a job-level env indirection.
      - name: Detect Apple signing secrets
        id: apple_secrets
        shell: bash
        run: |
          if [[ -n "$APPLE_CERT" ]]; then
            echo "have_cert=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_cert=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Build Tauri app (signed macOS)
        if: runner.os == 'macOS' && steps.apple_secrets.outputs.have_cert == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Chunky ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.bundle_args }}

      - name: Build Tauri app (unsigned)
        if: runner.os != 'macOS' || steps.apple_secrets.outputs.have_cert != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Chunky ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.bundle_args }}

  # Universal macOS binary — fat binary combining arm64 + x86_64.
  # Runs after both macOS builds complete so it can download their artifacts.
  macos-universal:
    name: Build (macOS universal)
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-universal-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-universal-cargo-

      - name: Install Node dependencies
        run: pnpm install

      - name: Fetch BGE embedding model
        run: bash scripts/fetch-bge-model.sh

      - name: Detect Apple signing secrets
        id: apple_secrets
        shell: bash
        run: |
          if [[ -n "$APPLE_CERT" ]]; then
            echo "have_cert=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_cert=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Build universal macOS bundle (signed)
        if: steps.apple_secrets.outputs.have_cert == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Chunky ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: false
          args: '--target universal-apple-darwin'

      - name: Build universal macOS bundle (unsigned)
        if: steps.apple_secrets.outputs.have_cert != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Chunky ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: false
          args: '--target universal-apple-darwin'
